{{- $skills := hugo.Data.skills -}}
{{- with $skills.categories -}}
<section class="home-skills">
    <h2 class="section-title">Skills</h2>
    <div class="skills-grid">
        {{- range . -}}
        <div class="skill-category">
            <h3 class="skill-category-name">{{ .name }}</h3>
            <ul class="skill-list">
                {{- range .items -}}
                <li class="skill-tag">{{ . }}</li>
                {{- end -}}
            </ul>
        </div>
        {{- end -}}
    </div>
</section>
{{- end -}}
