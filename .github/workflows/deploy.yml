name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo, Quarto, uv
        run: |
          chmod +x ./scripts/install.sh
          ./scripts/install.sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: ~/hugo_cache
          key: hugo-${{ hashFiles('config.toml', 'content/**') }}
          restore-keys: hugo-

      - name: Install Python dependencies
        run: uv sync

      - name: Build site
        run: |
          sed -i "s/{{COMMIT}}/${GITHUB_SHA:0:6}/g" config.toml
          sed -i "s/{{DATE}}/$(date '+%A %e %B %Y')/g" config.toml
          rm -rf public
          uv run quarto render && hugo --cacheDir ~/hugo_cache

      - name: Build Marimo WASM notebooks
        run: |
          chmod +x ./scripts/install_marimo_notebooks.sh
          ./scripts/install_marimo_notebooks.sh public

      - name: Deploy to server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            public/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/usr/share/nginx/html/"
